<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kitravia – Bookmarks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    body{
      margin:0;
      font-family:Inter,system-ui;
      background:#f6f7fb;
      color:#0b1220;
    }
    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:24px;
    }
    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    .title{
      font-size:24px;
      font-weight:900;
      margin:0;
    }
    .btn{
      border:1px solid rgba(43,100,232,.35);
      background:#fff;
      border-radius:12px;
      padding:10px 12px;
      font-weight:900;
      cursor:pointer;
      color:#1f5bd8;
      text-decoration:none;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:14px;
      margin-top:18px;
    }
    .card{
      background:#fff;
      border:1px solid rgba(15,23,42,.10);
      border-radius:16px;
      padding:14px;
      box-shadow:0 12px 28px rgba(15,23,42,.10);
    }
    .route{
      font-weight:900;
      margin:0;
    }
    .meta{
      margin-top:8px;
      color:#5b6b86;
      font-weight:600;
      font-size:13px;
      line-height:1.4;
    }
    .actions{
      margin-top:12px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .danger{
      border-color:rgba(220,38,38,.35);
      color:#b91c1c;
    }
    @media (max-width: 900px){
      .grid{ grid-template-columns:1fr 1fr; }
    }
    @media (max-width: 560px){
      .grid{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1 class="title">Your Bookmarks</h1>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <a class="btn" href="/">← Back to search</a>
        <button class="btn danger" id="clearAll">Clear all</button>
      </div>
    </div>

    <div id="empty" style="margin-top:16px;color:#5b6b86;font-weight:700;display:none;">
      No bookmarks yet. Go search flights and click Bookmark.
    </div>

    <div id="grid" class="grid"></div>
  </div>

  <script>
    const BOOKMARK_KEY = "kitravia_bookmarks_v1";

    function loadBookmarks(){
      try{
        return JSON.parse(localStorage.getItem(BOOKMARK_KEY)) || [];
      }catch{
        return [];
      }
    }

    function saveBookmarks(list){
      localStorage.setItem(BOOKMARK_KEY, JSON.stringify(list));
    }

    function render(){
      const list = loadBookmarks();
      const grid = document.getElementById("grid");
      const empty = document.getElementById("empty");

      if(!list.length){
        grid.innerHTML = "";
        empty.style.display = "block";
        return;
      }

      empty.style.display = "none";

      grid.innerHTML = list.map((b, i) => {
        const s = b.summary || {};
        const out = s.out || {};
        const isRT = !!s.isRT;
        const title = isRT ? `${out.from} → ${out.to} (Round-trip)` : `${out.from || ""} → ${out.to || ""}`;
        const extra = isRT && s.back ? `Return: ${s.back.from} → ${s.back.to}` : "";

        return `
          <div class="card">
            <p class="route">${title}</p>
            <div class="meta">
              <div>Price: ${b.price || ""}</div>
              <div>Airline: ${b.carrier || ""}</div>
              <div>${extra}</div>
              <div>Saved: ${new Date(b.savedAt).toLocaleString()}</div>
              <div><strong>Note:</strong> ${b.note || "No note yet"}</div>
            </div>
            <div style="margin-top:12px;">
                    <textarea
                      data-note="${i}"
                      placeholder="Write a note..."
                      style="width:100%; min-height:80px; padding:10px; border:1px solid rgba(15,23,42,.12); border-radius:12px; font-family:Inter,system-ui; font-size:13px; resize:vertical;"
                    >${b.note || ""}</textarea>
                  </div>

                  <div class="actions">
                    <button class="btn" data-save="${i}">Save Note</button>
                    <button class="btn" data-open="${i}">View JSON</button>
                    <button class="btn danger" data-remove="${i}">Remove</button>
            </div>  
          </div>
        `;
      }).join("");

      grid.querySelectorAll("[data-remove]").forEach(btn => {
        btn.addEventListener("click", () => {
          const idx = Number(btn.dataset.remove);
          const list = loadBookmarks();
          list.splice(idx, 1);
          saveBookmarks(list);
          render();
        });
      });

      grid.querySelectorAll("[data-open]").forEach(btn => {
        btn.addEventListener("click", () => {
          const idx = Number(btn.dataset.open);
          const list = loadBookmarks();
          alert(JSON.stringify(list[idx]?.offer || {}, null, 2));
        });
      });

      grid.querySelectorAll("[data-save]").forEach(btn => {
          btn.addEventListener("click", () => {
            const idx = Number(btn.dataset.save);
            const noteBox = grid.querySelector(`[data-note="${idx}"]`);
            const list = loadBookmarks();

            if (!list[idx]) return;

            list[idx].note = noteBox.value;
            saveBookmarks(list);
            alert("Note saved.");
          });
});
    }

    document.getElementById("clearAll").addEventListener("click", () => {
      if(confirm("Clear all bookmarks?")){
        saveBookmarks([]);
        render();
      }
    });

    render();
  </script>
</body>
</html>
