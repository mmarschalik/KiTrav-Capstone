<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitravia Logo Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 p-8">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold mb-8 text-gray-800">Kitravia Logo Variations</h1>
    
    <!-- Large Logo on White -->
    <div class="bg-white p-12 rounded-2xl shadow-lg mb-6">
      <h2 class="text-lg font-semibold text-gray-600 mb-4">Large - White Background</h2>
      <div class="flex items-center gap-3 h-16">
        <div class="relative">
          <div class="p-2.5 rounded-xl rotate-12 hover:rotate-0 transition-transform duration-300"
               style="background: linear-gradient(135deg, #004aad 0%, #fc0000 100%);">
            <svg class="w-8 h-8 text-white -rotate-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
            </svg>
          </div>
          <div class="absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
        </div>
        <div class="flex flex-col">
          <span class="text-4xl font-bold tracking-tight" style="color: #004aad;">KITRAVIA</span>
          <span class="text-xs font-semibold tracking-wider" style="color: #fc0000;">VISA SERVICES</span>
        </div>
      </div>
    </div>

    <!-- Normal Logo on White -->
    <div class="bg-white p-12 rounded-2xl shadow-lg mb-6">
      <h2 class="text-lg font-semibold text-gray-600 mb-4">Normal - White Background</h2>
      <div class="flex items-center gap-3 h-12">
        <div class="relative">
          <div class="p-2.5 rounded-xl rotate-12 hover:rotate-0 transition-transform duration-300"
               style="background: linear-gradient(135deg, #004aad 0%, #fc0000 100%);">
            <svg class="w-6 h-6 text-white -rotate-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
            </svg>
          </div>
          <div class="absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
        </div>
        <div class="flex flex-col">
          <span class="text-2xl font-bold tracking-tight" style="color: #004aad;">KITRAVIA</span>
          <span class="text-[9px] font-semibold tracking-wider" style="color: #fc0000;">VISA SERVICES</span>
        </div>
      </div>
    </div>

    <!-- Small Logo on White -->
    <div class="bg-white p-12 rounded-2xl shadow-lg mb-6">
      <h2 class="text-lg font-semibold text-gray-600 mb-4">Small - White Background</h2>
      <div class="flex items-center gap-3 h-8">
        <div class="relative">
          <div class="p-2.5 rounded-xl rotate-12 hover:rotate-0 transition-transform duration-300"
               style="background: linear-gradient(135deg, #004aad 0%, #fc0000 100%);">
            <svg class="w-5 h-5 text-white -rotate-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
            </svg>
          </div>
          <div class="absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
        </div>
        <div class="flex flex-col">
          <span class="text-lg font-bold tracking-tight" style="color: #004aad;">KITRAVIA</span>
          <span class="text-[7px] font-semibold tracking-wider" style="color: #fc0000;">VISA SERVICES</span>
        </div>
      </div>
    </div>

    <!-- Logo on Blue Background -->
    <div class="p-12 rounded-2xl shadow-lg mb-6" style="background: linear-gradient(135deg, #004aad, #0066ff);">
      <h2 class="text-lg font-semibold text-white mb-4">Normal - Blue Background</h2>
      <div class="flex items-center gap-3 h-12">
        <div class="relative">
          <div class="p-2.5 rounded-xl bg-white/20 backdrop-blur-sm rotate-12 hover:rotate-0 transition-transform duration-300">
            <svg class="w-6 h-6 text-white -rotate-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
            </svg>
          </div>
          <div class="absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
        </div>
        <div class="flex flex-col">
          <span class="text-2xl font-bold tracking-tight text-white">KITRAVIA</span>
          <span class="text-[9px] font-semibold tracking-wider" style="color: #fc0000;">VISA SERVICES</span>
        </div>
      </div>
    </div>

    <!-- Color Guide -->
    <div class="bg-white p-8 rounded-2xl shadow-lg">
      <h2 class="text-lg font-semibold text-gray-600 mb-4">Brand Colors</h2>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <div class="w-full h-20 rounded-lg mb-2" style="background: #004aad;"></div>
          <p class="font-mono text-sm">#004aad</p>
          <p class="text-xs text-gray-500">Primary Blue</p>
        </div>
        <div>
          <div class="w-full h-20 rounded-lg mb-2" style="background: #fc0000;"></div>
          <p class="font-mono text-sm">#fc0000</p>
          <p class="text-xs text-gray-500">Accent Red</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
